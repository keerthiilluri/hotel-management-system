<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <ul>
            <li onclick="showSection('dashboard')">Dashboard</li>
            <li onclick="showSection('rooms')">Manage Rooms</li>
            <li onclick="showSection('bookings')">Bookings</li>
            <li onclick="showSection('tariffs')">Tariffs</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Dashboard -->
        <div id="dashboard" class="section">
            <h1>Welcome Admin</h1>
            <p>Manage hotel operations easily</p>
        </div>

        <!-- Rooms -->
        <div id="rooms" class="section hidden">
            <h2>Manage Rooms</h2>

            <input type="text" id="roomName" placeholder="Room Name">
            <input type="number" id="roomPrice" placeholder="Price">
            <button onclick="addRoom()">Add Room</button>

            <ul id="roomList"></ul>
        </div>

        <!-- Bookings -->
        <div id="bookings" class="section hidden">
            <h2>Bookings</h2>
            <p>Booking data will appear here </p>
        </div>

        <!-- Tariffs -->
        <div id="tariffs" class="section hidden">
            <h2>Set Tariffs</h2>

            <input type="text" id="type" placeholder="Room Type">
            <input type="number" id="price" placeholder="Price">
            <button onclick="setTariff()">Set Tariff</button>

            <ul id="tariffList"></ul>
        </div>

    </div>

    <script src="admin.js"></script>

</body>
</html>
